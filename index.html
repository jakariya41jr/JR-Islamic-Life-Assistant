<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic App | Md Jakariya Hasan</title>
    
    <meta name="theme-color" content="#1e3a8a">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Islamic%20App%22,%22short_name%22:%22IslamicApp%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231e3a8a%22,%22theme_color%22:%22%231e3a8a%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/3069/3069006.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #1e3a8a;
            --card-glass: rgba(255, 255, 255, 0.1);
            --border-glass: rgba(255, 255, 255, 0.2);
            --accent: #fbbf24;
            --text-white: #ffffff;
            --text-muted: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Bangla', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Glassmorphism Card Design */
        .card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        /* Profile Section */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .profile-info h2 { font-size: 20px; margin-bottom: 4px; }
        .profile-info p { font-size: 13px; color: var(--text-muted); opacity: 0.8; }

        /* Tasbih Section */
        .tasbih-box {
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .tasbih-box h3 { font-size: 32px; color: var(--accent); margin-top: 5px; }
        
        /* Ripple effect */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
        }
        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }

        /* Developer Button with Animation */
        .dev-btn {
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            color: #1e3a8a;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(251, 191, 36, 0.4);
            animation: pulse-glow 2s infinite;
            text-decoration: none;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        /* Download Button */
        #installBtn {
            background: transparent;
            border: 2px solid #10b981;
            color: #10b981;
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            display: none; /* Initially hidden */
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Caption Section */
        .caption-card { border-top: 4px solid var(--accent); }
        .caption-title { font-weight: 600; color: var(--accent); margin-bottom: 15px; display: flex; justify-content: space-between; }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 24px;
            text-align: center;
            line-height: 1.8;
            margin: 15px 0;
            display: block;
        }

        .bangla {
            font-size: 16px;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-style: italic;
        }

        .meta { font-size: 12px; text-align: right; color: #94a3b8; }

        /* Action Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn i { color: var(--accent); }

        /* Loader */
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .fade-in { animation: fadeIn 0.6s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="card profile-section">
            <img src="https://images.unsplash.com/photo-1590076215667-875d45099e3a?q=80&w=200&auto=format&fit=crop" class="profile-img" alt="Islamic Art">
            <div class="profile-info">
                <h2>মোঃ জাকারিয়া হাসান</h2>
                <p><i class="fa-solid fa-location-dot"></i> Dhaka, বাংলাদেশ</p>
            </div>
        </div>

        <div class="card tasbih-box" id="tasbihCard">
            <p style="font-size: 14px; color: var(--text-muted);">মোট পঠিত তাসবিহ</p>
            <h3><span id="counter">0</span> বার</h3>
            <p style="font-size: 11px; margin-top: 5px; opacity: 0.6;">(গণনা করতে এখানে ক্লিক করুন)</p>
        </div>

        <a href="https://jakariya41jr.pro.bd" target="_blank" class="dev-btn">
            <i class="fa-solid fa-code"></i> ডেভেলপার: Md Jakariya Hasan
        </a>

        <button id="installBtn">
            <i class="fa-solid fa-circle-down"></i> অ্যাপ ইন্সটল করুন
        </button>

        <div class="card caption-card">
            <div class="caption-title">
                <span>ইসলামিক ক্যাপশন (API)</span>
                <i class="fa-solid fa-kaaba"></i>
            </div>

            <div id="contentArea" class="fade-in">
                <span class="arabic" id="ayahArabic">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</span>
                <p class="bangla" id="ayahBangla">"পরম করুণাময় অসীম দয়ালু আল্লাহর নামে।"</p>
                <p class="meta" id="ayahMeta">সূরা: ফাতিহা | আয়াত: ১</p>
            </div>

            <div class="btn-group">
                <button class="action-btn" onclick="copyText()"><i class="fa-regular fa-copy"></i> কপি</button>
                <button class="action-btn" onclick="shareApp()"><i class="fa-solid fa-share-nodes"></i> শেয়ার</button>
                <button class="action-btn" id="refreshBtn" onclick="getNewAyah()">
                    <i class="fa-solid fa-rotate-right" id="refreshIcon"></i> রিফ্রেশ
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- 1. Tasbih Counter with Ripple ---
        let count = 0;
        const tasbihCard = document.getElementById('tasbihCard');
        tasbihCard.addEventListener('click', function(e) {
            count++;
            document.getElementById('counter').innerText = count;

            // Ripple Effect
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            this.appendChild(ripple);
            let x = e.clientX - e.target.offsetLeft;
            let y = e.clientY - e.target.offsetTop;
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            setTimeout(() => { ripple.remove(); }, 600);
        });

        // --- 2. Quran API Integration ---
        async function getNewAyah() {
            const icon = document.getElementById('refreshIcon');
            const area = document.getElementById('contentArea');
            
            icon.classList.add('spinning');
            area.style.opacity = '0.4';

            try {
                // Fetching random ayah with Bengali translation
                const randomAyahNum = Math.floor(Math.random() * 6236) + 1;
                const response = await fetch(`https://api.alquran.cloud/v1/ayah/${randomAyahNum}/editions/quran-uthmani,bn.bengali`);
                const data = await response.json();

                if(data.code === 200) {
                    const arabic = data.data[0].text;
                    const bangla = data.data[1].text;
                    const surah = data.data[1].surah.englishName;
                    const num = data.data[1].numberInSurah;

                    document.getElementById('ayahArabic').innerText = arabic;
                    document.getElementById('ayahBangla').innerText = `"${bangla}"`;
                    document.getElementById('ayahMeta').innerText = `সূরা: ${surah} | আয়াত: ${num}`;
                    
                    area.classList.remove('fade-in');
                    void area.offsetWidth; // trigger reflow
                    area.classList.add('fade-in');
                }
            } catch (err) {
                console.log("Error fetching API");
                document.getElementById('ayahBangla').innerText = "ডেটা লোড হতে সমস্যা হচ্ছে। ইন্টারনেট চেক করুন।";
            } finally {
                icon.classList.remove('spinning');
                area.style.opacity = '1';
            }
        }

        // --- 3. Copy & Share ---
        function copyText() {
            const text = `${document.getElementById('ayahArabic').innerText}\n${document.getElementById('ayahBangla').innerText}\n${document.getElementById('ayahMeta').innerText}`;
            navigator.clipboard.writeText(text);
            alert("কপি করা হয়েছে!");
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'Islamic Caption',
                    text: document.getElementById('ayahBangla').innerText,
                    url: window.location.href
                });
            }
        }

        // --- 4. PWA Install Logic (Download Fix) ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex'; // Show button when ready
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // Register Service Worker (Fake for UI, works on real hosting)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener(%22fetch%22,function(e){})');
        }

        // Load initial Ayah
        window.onload = getNewAyah;
    </script>
</body>
</html>
